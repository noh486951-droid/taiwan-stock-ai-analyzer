name = "tw-stock-ai-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# KV 命名空間 — 用於自選股雲端同步
# 建立方式：wrangler kv namespace create WATCHLIST_KV
# 建立後把 id 填入下方
[[kv_namespaces]]
binding = "WATCHLIST_KV"
id = "4a8fe74d07a14f1fb2bdfe2e15412c03"

# v10.8 Worker cron — GH Actions */15 的 failsafe
# UTC 01:00-05:45 Mon-Fri = TW 09:00-13:45 盤中時段
# 選 :02 :17 :32 :47 錯開 GH schedule（:07 :22 :37 :52）→ 雙保險覆蓋率最大
# v11.10.5: 加 main.yml 的 4 個時段 backup（GH cron 整點 / 錯峰整點都容易 drop）
[triggers]
crons = [
  "2,17,32,47 1-5 * * 1-5",  # watchlist_quick 盤中（每 15 min）
  "10 23 * * SUN-THU",            # main.yml 07:10 TW (週日~四 = 週一~五早上)
  "10 2 * * 1-5",             # main.yml 10:10 TW（盤中更新）
  "40 6 * * 1-5",             # main.yml 14:40 TW（收盤分析）
  "10 10 * * 1-5",            # main.yml 18:10 TW（盤後總結）
]

# 環境變數在 Cloudflare Dashboard 設定（不要寫在這裡）
# Settings > Variables > Environment Variables:
#   GOOGLE_API_KEY = 你的 Gemini API Key
#   MISTRAL_API_KEY_1 = 個股分析用 Mistral API Key 1
#   MISTRAL_API_KEY_2 = 個股分析用 Mistral API Key 2
#   MISTRAL_ANALYZE_MODEL = (可選) mistral-small-latest / mistral-medium-latest
#   ALLOWED_ORIGIN = https://你的帳號.github.io
#   PAPER_TRADE_ENGINE_SECRET = (v10.8) 給 GitHub Actions 虛擬投資引擎的密鑰，隨便生一個 32 字元字串即可
#   ADMIN_PASSWORD = (v10.8) 總控管後台登入密碼（目前設 779911）
#   GITHUB_DISPATCH_REPO = (v10.8) GH repository_dispatch 目標，格式 "owner/repo"，例 noh486951/taiwan-stock-ai-analyzer
#   GITHUB_DISPATCH_TOKEN = (v10.8) GitHub Personal Access Token，scope 需包含 repo (classic) 或 actions:write (fine-grained)
