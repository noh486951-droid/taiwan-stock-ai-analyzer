name = "tw-stock-ai-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# 環境變數在 Cloudflare Dashboard 設定（不要寫在這裡）
# Settings > Variables > Environment Variables:
#   GOOGLE_API_KEY = 你的 Gemini API Key
#   MISTRAL_API_KEY_1 = 個股分析用 Mistral API Key 1
#   MISTRAL_API_KEY_2 = 個股分析用 Mistral API Key 2
#   MISTRAL_ANALYZE_MODEL = (可選) mistral-small-latest / mistral-medium-latest
#   ALLOWED_ORIGIN = https://你的帳號.github.io
