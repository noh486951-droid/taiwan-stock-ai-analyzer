<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股 AI 盤勢分析器</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shape circle-1"></div>
    <div class="bg-shape circle-2"></div>
    <div class="bg-shape circle-3"></div>

    <div class="container">
        <header>
            <h1>⚡ <span>台股 AI</span> 盤勢分析器</h1>
            <p>由 AI 驅動的台灣股市深度洞察系統</p>
        </header>

        <nav class="nav-bar">
            <a href="index.html" class="active">📊 盤勢總覽</a>
            <a href="news.html">📰 財經新聞</a>
            <a href="watchlist.html">⭐ 自選股</a>
        </nav>

        <div class="dashboard-grid">
            <div class="card glass">
                <h2>📈 市場脈動</h2>
                <div id="marketPulseContent">
                    <p class="loading">正在載入 AI 分析...</p>
                </div>
            </div>

            <div class="card glass">
                <h2>📊 台股與國際指數</h2>
                <div class="indices-grid" id="indicesGrid"></div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card glass">
                <h2>💡 AI 觀察與建議</h2>
                <ul id="aiObservations"></ul>
            </div>

            <div class="card glass">
                <h2>🏢 三大法人籌碼動向</h2>
                <div class="chip-content" id="chipContent"></div>
            </div>
        </div>

        <div class="diagnostic-assistant glass">
            <h2>🤖 AI 個股快速查詢</h2>
            <p class="text-muted" style="margin-bottom:1rem;">輸入股票代碼即時查看技術指標與 AI 分析（資料來自自選股庫）</p>
            <div class="assistant-form">
                <input type="text" id="stockSymbol" placeholder="輸入股票代碼 (例: 2330.TW)">
                <button id="dispatchAnalysis" class="btn-primary">查詢個股</button>
            </div>
            <div id="quickStockResult"></div>
            <p id="assistantMsg" class="assistant-msg"></p>
        </div>

        <footer>
            <p>&copy; 2026 台股 AI 盤勢分析器 v7.0 | Powered by Gemini</p>
        </footer>
    </div>

    <script src="js/stock_names.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
