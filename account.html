<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳號設定 — 台股 AI 盤勢分析器</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css?v=12.0.4">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .acc-section {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.2rem 1.3rem;
            margin-bottom: 1rem;
        }
        .acc-section h3 { margin: 0 0 0.8rem; color: #c9b3ff; font-size: 1rem; }
        .acc-field { margin-bottom: 0.8rem; }
        .acc-field label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.3rem; }
        .acc-field input {
            width: 100%; padding: 0.6rem 0.8rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; color: #fff; font-size: 0.9rem;
        }
        .acc-info { font-size: 0.85rem; color: #aaa; line-height: 1.7; }
        .acc-info b { color: #fff; }
        .acc-msg { padding: 0.6rem 0.9rem; border-radius: 8px; margin: 0.8rem 0; font-size: 0.85rem; display: none; }
        .acc-msg.error { background: rgba(239,68,68,0.12); color:#fca5a5; border:1px solid rgba(239,68,68,0.3); display:block; }
        .acc-msg.success { background: rgba(34,197,94,0.12); color:#86efac; border:1px solid rgba(34,197,94,0.3); display:block; }
        .danger-btn { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; padding:0.6rem 1rem; border-radius:8px; cursor:pointer; font-size:0.85rem;}
        .danger-btn:hover { background:rgba(239,68,68,0.25); }
    </style>
</head>
<body>
    <div class="bg-shape circle-1"></div>
    <div class="bg-shape circle-2"></div>
    <div class="bg-shape circle-3"></div>
    <div id="sidebarRoot"></div>

    <div class="container">
        <header><h1>👤 <span>帳號設定</span></h1></header>

        <div class="page-title">
            <h1>我的帳號</h1>
            <p>修改個人資料、密碼、或刪除帳號</p>
        </div>

        <div id="accountContent"><p class="loading">載入中…</p></div>

        <footer><p>&copy; 2026 台股 AI 盤勢分析器 v12.0.0</p></footer>
    </div>

    <script src="js/auth.js?v=12.0.4"></script>
    <script src="js/auth_guard.js?v=12.0.4"></script>
    <script src="js/sidebar.js?v=12.0.4"></script>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!window.isLoggedIn()) return;   // auth_guard 會擋
        const el = document.getElementById('accountContent');
        try {
            const data = await window.fetchMe();
            const u = data.user;
            el.innerHTML = `
                <div class="acc-section">
                    <h3>📋 基本資料</h3>
                    <div class="acc-info">
                        <p>Email：<b>${u.email}</b> ${u.email_verified ? '✅ 已驗證' : ''}</p>
                        <p>顯示名稱：<b>${u.display_name}</b></p>
                        <p>登入方式：
                            ${u.has_password ? '🔑 密碼 ' : ''}
                            ${u.has_google ? '🔵 Google ' : ''}
                        </p>
                        <p>建立時間：${u.created_at?.slice(0,10) || '-'}</p>
                        <p>User ID：<code style="font-size:0.7rem;color:#666;">${u.user_id}</code></p>
                    </div>
                </div>

                <div class="acc-section">
                    <h3>✏️ 修改顯示名稱</h3>
                    <form id="nameForm">
                        <div class="acc-field">
                            <input type="text" name="display_name" value="${u.display_name}" maxlength="30" required />
                        </div>
                        <button class="btn-primary" type="submit">儲存</button>
                    </form>
                </div>

                ${u.has_password ? `
                <div class="acc-section">
                    <h3>🔐 修改密碼</h3>
                    <form id="pwForm">
                        <div class="acc-field">
                            <label>目前密碼</label>
                            <input type="password" name="current_password" required minlength="8" />
                        </div>
                        <div class="acc-field">
                            <label>新密碼（至少 8 字）</label>
                            <input type="password" name="new_password" required minlength="8" />
                        </div>
                        <button class="btn-primary" type="submit">更新密碼</button>
                    </form>
                </div>
                ` : `
                <div class="acc-section">
                    <h3>🔐 設定密碼</h3>
                    <p class="acc-info">你目前只用 Google 登入。設定密碼後，可用 email + 密碼登入。</p>
                    <form id="pwForm">
                        <div class="acc-field">
                            <label>新密碼（至少 8 字）</label>
                            <input type="password" name="new_password" required minlength="8" />
                        </div>
                        <button class="btn-primary" type="submit">設定密碼</button>
                    </form>
                </div>
                `}

                <div class="acc-section">
                    <h3>🔄 從舊暱稱匯入資料</h3>
                    <p class="acc-info">如果你 v12 之前用過暱稱模式，可以一鍵把舊資料（自選股、持倉、交易紀錄）匯入到目前帳號。</p>
                    <a href="migrate.html" class="btn-primary" style="display:inline-block;text-decoration:none;margin-top:0.5rem;">🔄 前往匯入頁</a>
                </div>

                <div id="accMsg" class="acc-msg"></div>

                <div class="acc-section" style="border-color: rgba(239,68,68,0.3);">
                    <h3 style="color:#fca5a5;">⚠️ 危險區</h3>
                    <p class="acc-info">登出此裝置 / 刪除帳號（不可復原）。</p>
                    <div style="display:flex;gap:0.5rem;margin-top:0.8rem;flex-wrap:wrap;">
                        <button class="btn-secondary" id="logoutBtn">登出</button>
                        <button class="danger-btn" id="deleteAccountBtn">🗑️ 永久刪除我的帳號</button>
                    </div>
                </div>
            `;

            // v12.0.2：toast 反饋 + 按鈕 loading 狀態
            function showToast(txt, type='success', ms=2500) {
                const t = document.createElement('div');
                t.style.cssText = `
                    position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
                    background:${type==='success'?'rgba(34,197,94,0.95)':'rgba(239,68,68,0.95)'};
                    color:white;padding:0.7rem 1.4rem;border-radius:10px;
                    box-shadow:0 8px 30px rgba(0,0,0,0.4);
                    z-index:99999;font-weight:600;font-size:0.92rem;
                    opacity:0;transition:all 0.25s ease;
                `;
                t.textContent = txt;
                document.body.appendChild(t);
                requestAnimationFrame(() => {
                    t.style.opacity = '1';
                    t.style.transform = 'translateX(-50%) translateY(0)';
                });
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(-50%) translateY(-20px)';
                }, ms);
                setTimeout(() => t.remove(), ms + 300);
            }

            // v12.0.2：包裝按鈕 loading 狀態 + 短震動（手機）
            async function withButtonLoading(btn, label, asyncFn) {
                const origText = btn.innerHTML;
                const origDisabled = btn.disabled;
                btn.disabled = true;
                btn.style.opacity = '0.7';
                btn.innerHTML = `<span style="display:inline-block;animation:spin 1s linear infinite;">⏳</span> ${label}`;
                if (!document.getElementById('btn-spin-style')) {
                    const s = document.createElement('style');
                    s.id = 'btn-spin-style';
                    s.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
                    document.head.appendChild(s);
                }
                try {
                    const r = await asyncFn();
                    // 成功：按鈕短暫變綠
                    btn.innerHTML = '✅ 成功';
                    btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
                    if (navigator.vibrate) navigator.vibrate(30);
                    setTimeout(() => {
                        btn.innerHTML = origText;
                        btn.disabled = origDisabled;
                        btn.style.opacity = '';
                        btn.style.background = '';
                    }, 1200);
                    return r;
                } catch (err) {
                    btn.innerHTML = '❌ 失敗';
                    btn.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    setTimeout(() => {
                        btn.innerHTML = origText;
                        btn.disabled = origDisabled;
                        btn.style.opacity = '';
                        btn.style.background = '';
                    }, 1500);
                    throw err;
                }
            }

            document.getElementById('nameForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type=submit]');
                const fd = new FormData(e.target);
                try {
                    await withButtonLoading(btn, '儲存中…', () =>
                        window.updateMe({ display_name: fd.get('display_name') })
                    );
                    showToast('✅ 顯示名稱已更新，sidebar 會立即同步');
                    // 立刻同步 sidebar profile（不用等下次重整）
                    const user = window.getCurrentUser();
                    if (user) {
                        user.display_name = fd.get('display_name');
                        localStorage.setItem('tw_user_profile', JSON.stringify(user));
                        // 觸發 onAuthChange 讓 sidebar 重繪
                        if (window.onAuthChange) {
                            // 重新呼叫 fetchMe 強制同步
                            window.fetchMe().catch(() => {});
                        }
                    }
                } catch (err) {
                    showToast('❌ ' + err.message, 'error', 3500);
                }
            });

            document.getElementById('pwForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type=submit]');
                const fd = new FormData(e.target);
                const patch = { new_password: fd.get('new_password') };
                if (fd.get('current_password')) patch.current_password = fd.get('current_password');
                try {
                    await withButtonLoading(btn, '更新中…', () => window.updateMe(patch));
                    showToast('✅ 密碼已更新');
                    e.target.reset();
                } catch (err) {
                    showToast('❌ ' + err.message, 'error', 3500);
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', async (e) => {
                const btn = e.target;
                await withButtonLoading(btn, '登出中…', () => window.authLogout()).catch(() => {});
                showToast('👋 已登出，3 秒後回首頁');
                setTimeout(() => location.href = 'index.html', 1500);
            });

            document.getElementById('deleteAccountBtn').addEventListener('click', async (e) => {
                if (!confirm('⚠️ 確定刪除帳號？所有自選股、持倉、交易紀錄都會永久消失，無法復原。')) return;
                if (!confirm('再確認一次：真的要刪除嗎？')) return;
                const btn = e.target;
                try {
                    await withButtonLoading(btn, '刪除中…', () => window.deleteMe());
                    window.clearSession();
                    showToast('🗑️ 帳號已刪除');
                    setTimeout(() => location.href = 'index.html', 1500);
                } catch (err) {
                    showToast('❌ ' + err.message, 'error', 3500);
                }
            });
        } catch (e) {
            el.innerHTML = `<div class="acc-section"><p style="color:#fca5a5;">載入失敗：${e.message}</p></div>`;
        }
    });
    </script>
</body>
</html>
