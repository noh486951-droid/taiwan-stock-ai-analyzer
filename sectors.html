<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 族群分層地圖 | 台股 AI 盤勢分析器</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css?v=12.2.6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shape circle-1"></div>
    <div class="bg-shape circle-2"></div>
    <div class="bg-shape circle-3"></div>

    <!-- v12.1.2: 左側 Sidebar -->
    <div id="sidebarRoot"></div>

    <div class="container">
        <header>
            <h1>⚡ <span>台股 AI</span> 盤勢分析器</h1>
            <p>由 AI 驅動的台灣股市深度洞察系統</p>
        </header>

        <div class="page-title">
            <h1>🗺️ AI 族群分層地圖</h1>
            <p>AI 驅動的產業鏈分析與資金輪動偵測</p>
        </div>

        <!-- 市場主題 -->
        <div class="card glass" style="margin-bottom:1.5rem;">
            <h2>🎯 今日市場主題</h2>
            <div id="marketTheme">
                <p class="loading">正在載入 AI 族群分析...</p>
            </div>
        </div>

        <!-- v12.1.2：產業漲跌熱力圖 (treemap) -->
        <div class="card glass" style="margin-bottom:1.5rem;">
            <h2>🌡️ 產業漲跌熱力圖</h2>
            <p class="text-muted" style="font-size:0.82rem;margin-bottom:0.8rem;">
                依個股<b>成交金額</b>決定區塊大小，<b>當日漲跌幅</b>決定顏色。紅熱→漲、綠涼→跌。
            </p>
            <div id="heatmapContainer" style="min-height:400px;"></div>
            <div id="heatmapMeta" style="margin-top:0.5rem;font-size:0.75rem;color:var(--text-muted);"></div>
        </div>

        <!-- 族群熱度地圖 -->
        <div class="card glass" style="margin-bottom:1.5rem;">
            <h2>🔥 族群熱度排行</h2>
            <div id="sectorHeatmap"></div>
        </div>

        <!-- v12.1.2: 10 日資金輪動熱力圖 -->
        <div class="card glass" id="rotationHeatmapCard" style="margin-bottom:1.5rem; display:none;">
            <h2>🌀 10 日資金輪動熱力圖</h2>
            <p class="text-muted" style="font-size:0.85rem;">綠色=累積上漲、紅色=累積下跌；標籤辨識「波段」vs「煙火」避免追到一日行情</p>
            <div id="rotationHeatmapContent"></div>
        </div>

        <!-- 產業鏈分析 -->
        <div class="card glass" style="margin-bottom:1.5rem;">
            <h2>🔗 產業鏈分析</h2>
            <div id="supplyChain"></div>
        </div>

        <!-- 資金輪動 -->
        <div class="card glass" style="margin-bottom:1.5rem;">
            <h2>💫 資金輪動訊號</h2>
            <div id="rotationSignal"></div>
        </div>

        <!-- 重大行事曆 -->
        <div class="card glass" style="margin-bottom:1.5rem;">
            <h2>📅 重大行事曆</h2>
            <div id="eventCalendar"></div>
        </div>

        <footer>
            <p>&copy; 2026 台股 AI 盤勢分析器 v12.1.2 | Powered by Gemini</p>
        </footer>
    </div>

    <script src="js/sidebar.js?v=12.2.6"></script>
    <script src="js/sectors.js"></script>
    <script src="js/stock_names.js?v=12.2.6"></script>
    <script src="js/sector_heatmap.js?v=12.2.6"></script>
    <script src="js/chat.js"></script>
</body>
</html>
