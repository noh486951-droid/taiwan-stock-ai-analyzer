name: Watchlist Quick Update

on:
  schedule:
    # v10.8 修正：避開 GitHub Actions 整點高峰（GH 整點最容易 drop scheduled workflow）
    # 錯峰到 :07 :22 :37 :52 → 每 15 分鐘一次，盤中 09:00-13:45 TW = 01:00-05:45 UTC
    # v11.14.6 修正：原本 `1-5` (POSIX 應為 Mon-Fri) 實際上行為像 Quartz 風 (Sun-Thu)，
    # 導致禮拜五幾乎沒跑、禮拜日反而狂跑。改用無歧義的命名週期 MON-FRI。
    # 腳本內部仍會檢查交易時間，非交易時段 exit(0)
    - cron: '7,22,37,52 1-5 * * MON-FRI'

  # v10.8 failsafe：Cloudflare Worker cron 在 :02 :17 :32 :47 打 repository_dispatch
  # 當 GH 自己的 schedule 被 drop 時，Worker 仍能把 workflow 推起來
  repository_dispatch:
    types: [trigger-watchlist-quick]

  workflow_dispatch: # 手動觸發

# v10.8.2 併發保護：確保同時間只有一個 run 在動 data/
# 若 :07 schedule 遲到撞到 :17 CF Worker dispatch，後者會被丟掉（不排隊）
# 丟掉是對的：資料 15 分鐘後本來就會再抓一次，排隊只會累積舊資料 + git push 衝突
concurrency:
  group: watchlist-quick
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watchlist_update:
    runs-on: ubuntu-latest
    steps:
      # v11.12: 週末防護 — 台股休市，自動排程不需要跑
      - name: Weekend Guard
        if: github.event_name != 'workflow_dispatch'
        run: |
          DOW=$(TZ='Asia/Taipei' date +%u)  # 1=Mon ... 7=Sun
          echo "Taiwan day-of-week: $DOW"
          if [ "$DOW" -ge 6 ]; then
            echo "⏰ 週末（台股休市），跳過快速更新。"
            echo "SKIP_WEEKEND=true" >> $GITHUB_ENV
          fi

      - name: Exit if weekend
        if: env.SKIP_WEEKEND == 'true'
        run: |
          echo "🛑 Weekend detected, exiting."
          exit 1

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Watchlist Quick Update
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python scripts/watchlist_quick.py
        timeout-minutes: 8

      # v10.8 虛擬投資引擎 — 讀 watchlist_analysis.json 自動交易
      - name: Paper Trade Engine
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_TRADES: ${{ secrets.DISCORD_WEBHOOK_TRADES }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
        run: python scripts/paper_trade_engine.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Analyzer Bot"
          # v11.13.1：穩定 commit/push — 失敗時 reset + reapply data/ 而非 rebase
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true

            git add data/
            git commit -m "Quick Update: $(date +'%Y-%m-%d %H:%M')" -q || {
              echo "ℹ️ No changes to commit"
              exit 0
            }

            if git push 2>&1; then
              echo "✅ pushed on attempt $i"
              exit 0
            fi

            echo "⚠️ push rejected (attempt $i), reset + reapply data/..."
            BACKUP=/tmp/data_backup_$i
            rm -rf "$BACKUP"
            cp -r data/ "$BACKUP"

            git reset --hard HEAD~1 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main

            cp -rfT "$BACKUP" data/

            sleep $((RANDOM % 5 + 3))
          done
          echo "❌ push failed after 5 retries"
          exit 1
