name: Watchlist Quick Update

on:
  schedule:
    # v10.8 修正：避開 GitHub Actions 整點高峰（GH 整點最容易 drop scheduled workflow）
    # 錯峰到 :07 :22 :37 :52 → 每 15 分鐘一次，盤中 09:00-13:45 TW = 01:00-05:45 UTC
    # 腳本內部仍會檢查交易時間，非交易時段 exit(0)
    - cron: '7,22,37,52 1-5 * * 1-5'

  # v10.8 failsafe：Cloudflare Worker cron 在 :02 :17 :32 :47 打 repository_dispatch
  # 當 GH 自己的 schedule 被 drop 時，Worker 仍能把 workflow 推起來
  repository_dispatch:
    types: [trigger-watchlist-quick]

  workflow_dispatch: # 手動觸發

# v10.8.2 併發保護：確保同時間只有一個 run 在動 data/
# 若 :07 schedule 遲到撞到 :17 CF Worker dispatch，後者會被丟掉（不排隊）
# 丟掉是對的：資料 15 分鐘後本來就會再抓一次，排隊只會累積舊資料 + git push 衝突
concurrency:
  group: watchlist-quick
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watchlist_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Watchlist Quick Update
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/watchlist_quick.py
        timeout-minutes: 8

      # v10.8 虛擬投資引擎 — 讀 watchlist_analysis.json 自動交易
      - name: Paper Trade Engine
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
        run: python scripts/paper_trade_engine.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Analyzer Bot"
          git add data/
          git commit -m "Quick Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
