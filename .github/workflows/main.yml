name: Auto Market Analyzer

on:
  schedule:
    # 07:00 (UTC+8) -> 23:00 UTC (前一天) — 晨間快報 + 盤前分析
    - cron: '0 23 * * 0-4'
    # 10:00 (UTC+8) -> 02:00 UTC — 盤中更新
    - cron: '0 2 * * 1-5'
    # 14:30 (UTC+8) -> 06:30 UTC — 收盤分析
    - cron: '30 6 * * 1-5'
    # 18:00 (UTC+8) -> 10:00 UTC — 盤後總結
    - cron: '0 10 * * 1-5'

  repository_dispatch:
    types: [trigger-ai-analysis]

  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  analyze_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Fetch All
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_all.py
        timeout-minutes: 10

      # v11.5: 美股龍頭 vs 台股供應鏈隔夜訊號（fetch_all 之後跑，讀其產出 raw_data.json）
      - name: US Giants Overnight Signal
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/us_giants_signal.py
        timeout-minutes: 2
        continue-on-error: true

      # v11.5: 個股未來事件（法說會 / 股東會 / 配息預告）— 抓 MOPS + TWSE
      - name: Corporate Events Fetcher
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_corporate_events.py
        timeout-minutes: 5
        continue-on-error: true

      # v10.5: 早上 cron 執行前抓自選股 MA5 成交量 — 讓盤中 watchlist_quick 不用重複抓
      - name: Daily Base Prefetch (MA5 volumes)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/daily_base_prefetch.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Run AI Analyzer
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/ai_analyzer.py
        timeout-minutes: 15

      # v11.4: 市場雷達 — 全市場排行榜掃描 + AI 自選股推薦（盤後 14:30/18:00 跑）
      - name: Market Scout (Radar + AI Pick)
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
        run: python scripts/scout.py --ai-pick
        timeout-minutes: 5
        continue-on-error: true

      # v10.8 虛擬投資引擎 — 收盤後 EOD 結算
      - name: Paper Trade Engine (EOD)
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
        run: python scripts/paper_trade_engine.py
        timeout-minutes: 3
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Analyzer Bot"
          git add data/
          git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
