name: Auto Market Analyzer

on:
  schedule:
    # 07:00 (UTC+8) -> 23:00 UTC (前一天) — 晨間快報 + 盤前分析
    - cron: '0 23 * * 0-4'
    # 10:00 (UTC+8) -> 02:00 UTC — 盤中更新
    - cron: '0 2 * * 1-5'
    # 14:30 (UTC+8) -> 06:30 UTC — 收盤分析
    - cron: '30 6 * * 1-5'
    # 18:00 (UTC+8) -> 10:00 UTC — 盤後總結
    - cron: '0 10 * * 1-5'

  repository_dispatch:
    types: [trigger-ai-analysis]

  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  analyze_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Fetch All
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_all.py
        timeout-minutes: 10

      # v10.5: 早上 cron 執行前抓自選股 MA5 成交量 — 讓盤中 watchlist_quick 不用重複抓
      - name: Daily Base Prefetch (MA5 volumes)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/daily_base_prefetch.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Run AI Analyzer
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/ai_analyzer.py
        timeout-minutes: 15

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Analyzer Bot"
          git add data/
          git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
