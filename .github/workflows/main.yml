name: Auto Market Analyzer

on:
  # v11.10.5: cron 錯峰避開整點（GH Actions 整點負載最高，schedule 容易被 drop）
  schedule:
    # 07:07 TW (前一晚 23:07 UTC) — 晨間快報 + 盤前分析（週日~週四 → 週一~週五早上）
    - cron: '7 23 * * 0-4'
    # 10:07 TW (02:07 UTC) — 盤中更新
    - cron: '7 2 * * 1-5'
    # 14:37 TW (06:37 UTC) — 收盤分析
    - cron: '37 6 * * 1-5'
    # 18:07 TW (10:07 UTC) — 盤後總結
    - cron: '7 10 * * 1-5'

  repository_dispatch:
    types: [trigger-ai-analysis, trigger-main]

  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  analyze_and_commit:
    runs-on: ubuntu-latest
    steps:
      # v11.12: 週末防護 — 台股休市，自動排程不需要跑
      # schedule / repository_dispatch 觸發時檢查，workflow_dispatch（手動）不擋
      - name: Weekend Guard
        if: github.event_name != 'workflow_dispatch'
        run: |
          DOW=$(TZ='Asia/Taipei' date +%u)  # 1=Mon ... 7=Sun
          echo "Taiwan day-of-week: $DOW"
          if [ "$DOW" -ge 6 ]; then
            echo "⏰ 週末（台股休市），跳過自動分析。"
            echo "SKIP_WEEKEND=true" >> $GITHUB_ENV
          fi

      - name: Exit if weekend
        if: env.SKIP_WEEKEND == 'true'
        run: |
          echo "🛑 Weekend detected, exiting."
          exit 1

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CJK fonts (給 matplotlib 中文圖表用)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Fetch All
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_all.py
        timeout-minutes: 10

      # v11.5: 美股龍頭 vs 台股供應鏈隔夜訊號（fetch_all 之後跑，讀其產出 raw_data.json）
      - name: US Giants Overnight Signal
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/us_giants_signal.py
        timeout-minutes: 2
        continue-on-error: true

      # v11.5: 個股未來事件（法說會 / 股東會 / 配息預告）— 抓 MOPS + TWSE
      - name: Corporate Events Fetcher
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_corporate_events.py
        timeout-minutes: 5
        continue-on-error: true

      # v11.9: 全球總經行事曆（FOMC / CPI / NFP / 央行 / 大型財報）
      - name: Macro Calendar Fetcher
        env:
          PYTHONUNBUFFERED: "1"
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
        run: python scripts/fetch_macro_calendar.py
        timeout-minutes: 5
        continue-on-error: true

      # v11.9: 產業輪動歷史追蹤（每日盤後 append 一筆）
      - name: Sector History Tracker
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/track_sector_history.py
        timeout-minutes: 3
        continue-on-error: true

      # v11.9 #7: 尾盤 5 分鐘量價監控（13-15 點視窗才會跑）
      - name: Closing Action Tracker
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python scripts/track_closing_action.py
        timeout-minutes: 8
        continue-on-error: true

      # v10.5: 早上 cron 執行前抓自選股 MA5 成交量 — 讓盤中 watchlist_quick 不用重複抓
      - name: Daily Base Prefetch (MA5 volumes)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/daily_base_prefetch.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Run AI Analyzer
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/ai_analyzer.py
        timeout-minutes: 15

      # v11.12 #1：把 AI 主播 morning_digest 推 Discord（每次 ai_analyzer 跑完後）
      - name: Push AI Morning Digest to Discord
        env:
          PYTHONUNBUFFERED: "1"
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
        run: python scripts/push_morning_digest.py
        timeout-minutes: 2
        continue-on-error: true

      # v11.4: 市場雷達 — 全市場排行榜掃描 + AI 自選股推薦（盤後 14:30/18:00 跑）
      - name: Market Scout (Radar + AI Pick)
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
        run: python scripts/scout.py --ai-pick
        timeout-minutes: 5
        continue-on-error: true

      # v10.8 虛擬投資引擎 — 收盤後 EOD 結算
      - name: Paper Trade Engine (EOD)
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_TRADES: ${{ secrets.DISCORD_WEBHOOK_TRADES }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
        run: python scripts/paper_trade_engine.py
        timeout-minutes: 3
        continue-on-error: true

      # v11.11 C：盤前準備卡（08:30 TW = 00:30 UTC，main.yml 早上那個 cron 跑時觸發）
      # Python 內部會檢查時段，非開盤前 08:00-09:30 之間不會推
      - name: Morning Brief
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
        run: |
          # 只在 TW 7:00-9:00 區間跑（避免午後重複推）
          HOUR=$(TZ='Asia/Taipei' date +%H)
          if [ "$HOUR" -ge 7 ] && [ "$HOUR" -lt 10 ]; then
            python scripts/morning_brief.py
          else
            echo "⏰ TZ hour $HOUR not in 7-9, skip morning brief"
          fi
        timeout-minutes: 3
        continue-on-error: true

      # v11.12 #F：月報（每月最後一個交易日 18:00 觸發；script 內部判斷）
      - name: Monthly Report (last trading day only)
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
        run: |
          # 只在 18:00 之後跑（避開白天 cron）
          HOUR=$(TZ='Asia/Taipei' date +%H)
          if [ "$HOUR" -ge 18 ]; then
            python scripts/monthly_report.py
          else
            echo "⏰ TZ hour $HOUR < 18, skip monthly check"
          fi
        timeout-minutes: 5
        continue-on-error: true

      # v11.11 E：引擎健康檢查（盤中 cron 跑時，若引擎 >2h 沒更新就警示）
      - name: Engine Health Check
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
        run: python scripts/engine_health_check.py
        timeout-minutes: 2
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Analyzer Bot"
          # v11.13.1：穩定 commit/push — 失敗時 reset + reapply data/ 而非 rebase
          # 原因：併發 workflow 互改 data/ 容易卡 rebase 衝突
          for i in 1 2 3 4 5; do
            # 清掉前次失敗殘留
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true

            git add data/
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')" -q || {
              echo "ℹ️ No changes to commit"
              exit 0
            }

            if git push 2>&1; then
              echo "✅ pushed on attempt $i"
              exit 0
            fi

            echo "⚠️ push rejected (attempt $i), reset + reapply data/..."
            # 備份本輪 data/ 到 runner 的暫存目錄
            BACKUP=/tmp/data_backup_$i
            rm -rf "$BACKUP"
            cp -r data/ "$BACKUP"

            # 回退到 HEAD~1（撤銷剛剛失敗的 commit）+ reset 到遠端最新
            git reset --hard HEAD~1 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main

            # 把本輪資料蓋回去（直接 overwrite，不 merge）
            cp -rfT "$BACKUP" data/

            sleep $((RANDOM % 5 + 3))
          done
          echo "❌ push failed after 5 retries"
          exit 1
