name: Auto Market Analyzer

on:
  # v11.10.5: cron 錯峰避開整點（GH Actions 整點負載最高，schedule 容易被 drop）
  # v11.14.7: cron 每天打 (dow='*')，靠 Weekend Guard + 程式內時段進行週末/交易時段過濾。
  #           解決 GH/CF 的 dow 欄位解析認知歧義（如 Quartz 誤判週五週日），最穩方案。
  schedule:
    # 07:07 TW (前一晚 23:07 UTC) — 晨間快報 + 盤前分析（週日~週四 UTC → 週一~週五早上 TW）
    - cron: '7 23 * * *'
    # 10:07 TW (02:07 UTC) — 盤中更新
    - cron: '7 2 * * *'
    # 14:37 TW (06:37 UTC) — 收盤分析
    - cron: '37 6 * * *'
    # 18:07 TW (10:07 UTC) — 盤後總結
    - cron: '7 10 * * *'

  repository_dispatch:
    types: [trigger-ai-analysis, trigger-main]

  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  analyze_and_commit:
    runs-on: ubuntu-latest
    steps:
      # v11.12: 週末防護 — 台股休市，自動排程不需要跑
      # schedule / repository_dispatch 觸發時檢查，workflow_dispatch（手動）不擋
      - name: Weekend Guard
        if: github.event_name != 'workflow_dispatch'
        run: |
          DOW=$(TZ='Asia/Taipei' date +%u)  # 1=Mon ... 7=Sun
          echo "Taiwan day-of-week: $DOW"
          if [ "$DOW" -ge 6 ]; then
            echo "⏰ 週末（台股休市），跳過自動分析。"
            echo "SKIP_WEEKEND=true" >> $GITHUB_ENV
          fi

      - name: Exit if weekend
        if: env.SKIP_WEEKEND == 'true'
        run: |
          echo "🛑 Weekend detected, exiting."
          exit 1

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 5   # 拿最近 5 個 commit 給版本偵測用

      - name: Detect version bump + push Discord
        env:
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 抓最近 commit message
          MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          # 偵測「v11.X.X」「feat/fix（不含 Quick Update / Auto Update）」
          if echo "$MSG" | grep -iE 'v[0-9]+\.[0-9]+' > /dev/null && ! echo "$MSG" | grep -E 'Auto Update|Quick Update' > /dev/null; then
            VERSION=$(echo "$MSG" | grep -oE 'v[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
            URL="${DISCORD_WEBHOOK_HEALTH:-$DISCORD_WEBHOOK_URL}"
            if [ -n "$URL" ]; then
              # 第一行當標題，前 1500 字當內容
              SUMMARY=$(echo "$MSG" | head -1)
              BODY=$(echo "$MSG" | tail -n +2 | head -c 1500)
              curl -X POST -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"🚀 版本更新 $VERSION\",\"description\":\"**$SUMMARY**\n\n\`\`\`$BODY\`\`\`\",\"color\":2274968,\"fields\":[{\"name\":\"作者\",\"value\":\"$AUTHOR\",\"inline\":true},{\"name\":\"時間\",\"value\":\"$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')\",\"inline\":true}],\"footer\":{\"text\":\"GitHub Actions · 版本通知\"}}]}" \
                "$URL" || echo "Discord push failed"
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CJK fonts (給 matplotlib 中文圖表用)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Fetch All
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_all.py
        timeout-minutes: 10

      # v11.5: 美股龍頭 vs 台股供應鏈隔夜訊號（fetch_all 之後跑，讀其產出 raw_data.json）
      - name: US Giants Overnight Signal
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/us_giants_signal.py
        timeout-minutes: 2
        continue-on-error: true

      # v11.5: 個股未來事件（法說會 / 股東會 / 配息預告）— 抓 MOPS + TWSE
      - name: Corporate Events Fetcher
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_corporate_events.py
        timeout-minutes: 5
        continue-on-error: true

      # v11.9: 全球總經行事曆（FOMC / CPI / NFP / 央行 / 大型財報）
      - name: Macro Calendar Fetcher
        env:
          PYTHONUNBUFFERED: "1"
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
        run: python scripts/fetch_macro_calendar.py
        timeout-minutes: 5
        continue-on-error: true

      # v11.9: 產業輪動歷史追蹤（每日盤後 append 一筆）
      - name: Sector History Tracker
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/track_sector_history.py
        timeout-minutes: 3
        continue-on-error: true

      # v11.9 #7: 尾盤 5 分鐘量價監控（13-15 點視窗才會跑）
      - name: Closing Action Tracker
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python scripts/track_closing_action.py
        timeout-minutes: 8
        continue-on-error: true

      # v10.5: 早上 cron 執行前抓自選股 MA5 成交量 — 讓盤中 watchlist_quick 不用重複抓
      - name: Daily Base Prefetch (MA5 volumes)
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/daily_base_prefetch.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Run AI Analyzer
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/ai_analyzer.py
        timeout-minutes: 15

      # v11.12 #1：把 AI 主播 morning_digest 推 Discord（每次 ai_analyzer 跑完後）
      - name: Push AI Morning Digest to Discord
        env:
          PYTHONUNBUFFERED: "1"
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
        run: python scripts/push_morning_digest.py
        timeout-minutes: 2
        continue-on-error: true

      # v12.2.7：市場雷達分時段策略
      #   18:07 EOD：跑 full scout（T86/月營收/TDCC 等盤後資料才齊全）→ 重建完整 radar
      #   其他時段（07:07/10:07/14:37）：跑 --ai-pick-only（只重生 AI picks，不覆蓋 radar）
      #   之前 bug：10:07/14:37 都跑 full scout，但 T86 還沒出 → radar 全部空白蓋掉 18:07 的好資料
      - name: Market Scout (EOD Full)
        # v12.3.2 修：18:07 EOD cron 是 '7 10 * * *'（含 '7 10 '），不是 '10 10'
        # 之前條件錯導致 EOD full scout 從沒跑過 → heatmap 卡死
        if: contains(github.event.schedule, '7 10 ') || github.event_name == 'workflow_dispatch'
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
        run: python scripts/scout.py --ai-pick
        timeout-minutes: 5
        continue-on-error: true

      - name: Market Scout (Pre/Intra — AI Pick only)
        # 與 EOD Full 互斥（schedule 不含 '7 10 ' 才跑）
        if: "!contains(github.event.schedule, '7 10 ') && github.event_name != 'workflow_dispatch'"
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
        run: python scripts/scout.py --ai-pick-only
        timeout-minutes: 5
        continue-on-error: true

      # v11.14.14：日/週/月強勢股 momentum scanner（全市場 1d/5d/20d 累積漲幅）
      # 只在收盤後或盤後時段（14:40 / 18:10 TW）跑，盤中跑沒意義也耗 yfinance 配額
      - name: Momentum Scanner (day/week/month)
        # v12.3.2 修：18:07 cron 是 '7 10 * * *' 不是 '10 10'；14:37 是 '37 6 * * *' 不是 '6 '
        if: contains(github.event.schedule, '37 6 ') || contains(github.event.schedule, '7 10 ') || github.event_name == 'workflow_dispatch'
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/momentum_scanner.py
        timeout-minutes: 8
        continue-on-error: true

      # v12.3.3：K 線資料抓取（持倉/歷史股 60 日 OHLC）— 給前端 modal 標記用
      - name: K-line Builder (持倉 + 歷史交易股)
        if: contains(github.event.schedule, '7 10 ') || github.event_name == 'workflow_dispatch'
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
        run: python scripts/klines_builder.py
        timeout-minutes: 5
        continue-on-error: true

      # v10.8 虛擬投資引擎 — 收盤後 EOD 結算
      - name: Paper Trade Engine (EOD)
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_TRADES: ${{ secrets.DISCORD_WEBHOOK_TRADES }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
        run: python scripts/paper_trade_engine.py
        timeout-minutes: 3
        continue-on-error: true

      # v11.11 C：盤前準備卡（08:30 TW = 00:30 UTC，main.yml 早上那個 cron 跑時觸發）
      # Python 內部會檢查時段，非開盤前 08:00-09:30 之間不會推
      - name: Morning Brief
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
        run: |
          # 只在 TW 7:00-9:00 區間跑（避免午後重複推）
          HOUR=$(TZ='Asia/Taipei' date +%H)
          if [ "$HOUR" -ge 7 ] && [ "$HOUR" -lt 10 ]; then
            python scripts/morning_brief.py
          else
            echo "⏰ TZ hour $HOUR not in 7-9, skip morning brief"
          fi
        timeout-minutes: 3
        continue-on-error: true

      # v11.12 #F：月報（每月最後一個交易日 18:00 觸發；script 內部判斷）
      - name: Monthly Report (last trading day only)
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
        run: |
          # 只在 18:00 之後跑（避開白天 cron）
          HOUR=$(TZ='Asia/Taipei' date +%H)
          if [ "$HOUR" -ge 18 ]; then
            python scripts/monthly_report.py
          else
            echo "⏰ TZ hour $HOUR < 18, skip monthly check"
          fi
        timeout-minutes: 5
        continue-on-error: true

      # v11.11 E：引擎健康檢查（盤中 cron 跑時，若引擎 >2h 沒更新就警示）
      - name: Engine Health Check
        env:
          PYTHONUNBUFFERED: "1"
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
        run: python scripts/engine_health_check.py
        timeout-minutes: 2
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Analyzer Bot"
          # v11.13.1：穩定 commit/push — 失敗時 reset + reapply data/ 而非 rebase
          # 原因：併發 workflow 互改 data/ 容易卡 rebase 衝突
          for i in 1 2 3 4 5; do
            # 清掉前次失敗殘留
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true

            git add data/
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')" -q || {
              echo "ℹ️ No changes to commit"
              exit 0
            }

            if git push 2>&1; then
              echo "✅ pushed on attempt $i"
              exit 0
            fi

            echo "⚠️ push rejected (attempt $i), reset + reapply data/..."
            # 備份本輪 data/ 到 runner 的暫存目錄
            BACKUP=/tmp/data_backup_$i
            rm -rf "$BACKUP"
            cp -r data/ "$BACKUP"

            # 回退到 HEAD~1（撤銷剛剛失敗的 commit）+ reset 到遠端最新
            git reset --hard HEAD~1 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main

            # 把本輪資料蓋回去（直接 overwrite，不 merge）
            cp -rfT "$BACKUP" data/

            sleep $((RANDOM % 5 + 3))
          done
          echo "❌ push failed after 5 retries"
          exit 1
