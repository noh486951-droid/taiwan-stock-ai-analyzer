name: Paper Trade Daily Review

# v10.9: 盤後 AI 檢討持倉，動態調整停損/目標
# 18:00 台北 = 10:00 UTC，T86/月營收等晚資料都已發佈完成
on:
  schedule:
    - cron: '0 10 * * *'   # 每天 10:00 UTC (18:00 TW) — v11.14.7 改全週觸發，Weekend Guard 過濾 Sat/Sun
  # v11.11.4: 加 repository_dispatch backup（Worker cron drop 時手動觸發）
  repository_dispatch:
    types: [trigger-daily-review]
  workflow_dispatch:

concurrency:
  group: paper-trade-daily-review
  cancel-in-progress: false

permissions:
  contents: read   # 本流程不需要推 git，只改 KV

jobs:
  daily_review:
    runs-on: ubuntu-latest
    steps:
      # v11.12: 週末防護 — 台股休市，自動排程不需要跑
      - name: Weekend Guard
        if: github.event_name != 'workflow_dispatch'
        run: |
          DOW=$(TZ='Asia/Taipei' date +%u)  # 1=Mon ... 7=Sun
          echo "Taiwan day-of-week: $DOW"
          if [ "$DOW" -ge 6 ]; then
            echo "⏰ 週末（台股休市），跳過每日檢討。"
            echo "SKIP_WEEKEND=true" >> $GITHUB_ENV
          fi

      - name: Exit if weekend
        if: env.SKIP_WEEKEND == 'true'
        run: |
          echo "🛑 Weekend detected, exiting."
          exit 1

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CJK fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: pip install requests pytz matplotlib

      - name: Run Daily Review
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          PAPER_TRADE_ENGINE_SECRET: ${{ secrets.PAPER_TRADE_ENGINE_SECRET }}
          NOTIFY_UID: ${{ secrets.NOTIFY_UID || '明芳' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_TRADES: ${{ secrets.DISCORD_WEBHOOK_TRADES }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
        run: python scripts/paper_trade_daily_review.py
        timeout-minutes: 10

      # v11.14.12 #4：每週一加跑「上週交易檢討」（找出贏/輸 pattern）
      - name: Weekly Trade Review (Mon only)
        if: env.SKIP_WEEKEND != 'true'
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
        run: |
          DOW=$(TZ='Asia/Taipei' date +%u)
          if [ "$DOW" = "1" ]; then
            echo "📅 週一，跑 weekly_review.py"
            python scripts/weekly_review.py
          else
            echo "⏭️ 非週一（DOW=$DOW），跳過 weekly review"
          fi
        timeout-minutes: 5
        continue-on-error: true
